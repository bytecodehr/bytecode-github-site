---
layout: default
---

<!-- begin contact -->
<div class="page-hero">
  <div class="container">
    <div class="page-head reveal">
      <div class="page-meta">
        <h1 class="page-title">{{ page.title | escape }}</h1>
        {% if page.description %}
          <p class="page-description">{{ page.description }}</p>
        {% endif %}
      </div>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="contact">
    <div class="container">
      <div class="contact__inner">

        <div class="contact__left reveal">
          <form class="form" action="https://formspree.io/f/xeqnooey" method="POST">
            <div class="form__group">
              <label class="form__label" for="form-name">Your name</label>
              <input class="form__input" id="form-name" type="text" name="name" placeholder="John Smith" required>
            </div>
            <div class="form__group">
              <label class="form__label" for="form-email">Your email</label>
              <input class="form__input" id="form-email" type="email" name="_replyto" placeholder="john@company.com" required>
            </div>
            <div class="form__group">
              <label class="form__label" for="form-text">Your message</label>
              <textarea class="form__input" id="form-text" name="text" rows="6" placeholder="Tell us about your project..." required></textarea>
            </div>
            <div class="form__group">
              <script src="https://www.google.com/recaptcha/api.js" async defer></script>
              <div class="g-recaptcha" data-sitekey="6LeVUZAiAAAAAEyuYzTb9Qk_gJ-ksc4M6Xvr-Nh7"></div>
            </div>
            <div class="form__group">
              <button class="form__submit" type="submit">
                <span>Send message</span>
                <span class="form__submit-arrow">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </span>
              </button>
            </div>
          </form>
        </div>

        {% if page.image %}
          <div class="contact__right reveal reveal-delay-2">
            <div class="contact__image">
              <img class="lazy" data-src="{{ site.baseurl }}{{ page.image }}" alt="{{ page.title }}">
            </div>
          </div>
        {% endif %}

      </div>

      <div class="contact__calendar reveal">
        <iframe src="https://koalendar.com/e/discuss-your-next-project-with-vedran-marcetic?embed=true" width="100%" height="800px" frameborder="0" loading="lazy"></iframe>
      </div>
    </div>
  </div>
</div>
<!-- end contact -->
