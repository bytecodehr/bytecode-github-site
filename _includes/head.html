<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO: Title -->
  <title>{% if page.title %}{{ page.title }} — {{ site.data.settings.title }}{% else %}{{ site.data.settings.title }} — Ruby and React Web Consultancy{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.data.settings.description }}{% endif %}">

  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.data.settings.title | escape }}" href="{{ "/feed.xml" | relative_url }}">

  <!-- Open Graph / Social -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:site_name" content="{{ site.data.settings.title }}">
  <meta property="og:title" content="{% if page.url == '/' %}{{ site.data.settings.title }} — Ruby and React Web Consultancy{% else %}{{ page.title }}{% endif %}">
  <meta property="og:description" content="{% if page.url == '/' %}{{ site.data.settings.description | strip_html | xml_escape }}{% elsif page.description %}{{ page.description | strip_html | xml_escape }}{% else %}{{ page.excerpt | default: site.data.settings.description | strip_html | xml_escape }}{% endif %}">
  {% if page.image %}<meta property="og:image" content="{{ page.image | absolute_url }}">{% endif %}
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.url == '/' %}{{ site.data.settings.title }}{% else %}{{ page.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.url == '/' %}{{ site.data.settings.description | strip_html | xml_escape }}{% elsif page.description %}{{ page.description | strip_html | xml_escape }}{% else %}{{ page.excerpt | default: site.data.settings.description | strip_html | xml_escape }}{% endif %}">
  {% if page.image %}<meta name="twitter:image" content="{{ page.image | absolute_url }}">{% endif %}

  <!-- Structured Data: Organization -->
  {% if page.url == "/" %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": "Bytecode",
    "url": "https://bytecode.hr",
    "description": "{{ site.data.settings.description | strip_html | xml_escape }}",
    "areaServed": "Worldwide",
    "knowsAbout": ["Ruby on Rails", "React", "PostgreSQL", "Web Application Development", "Mobile App Development", "Product Design"],
    "serviceType": ["Web Application Development", "Mobile App Development", "Product Design", "Consulting"]
  }
  </script>
  {% endif %}

  <!-- Structured Data: Article (blog posts) -->
  {% if page.layout == "post" %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TechArticle",
    "headline": "{{ page.title | xml_escape }}",
    "description": "{{ page.description | default: page.excerpt | strip_html | xml_escape | truncate: 160 }}",
    {% if page.image %}"image": "{{ page.image | absolute_url }}",{% endif %}
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Organization",
      "name": "Bytecode"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Bytecode",
      "url": "https://bytecode.hr"
    }
  }
  </script>
  {% endif %}

  <!-- Fonts: Satoshi (Fontshare) -->
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="preload" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" as="style">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">

  <!-- Iconify (tech gallery icons) -->
  <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js" defer></script>

  <!-- Inline SCSS -->
  <style>
  {% capture include_to_scssify %}
    {% include main.scss %}
  {% endcapture %}
  {{ include_to_scssify | scssify }}
  </style>

  <!-- Cookie Consent -->
  <script src="{{ site.baseurl }}/js/consent-modal.js"></script>
  <script>
    window.onload = async () => {
      await loadConsentModal();
      window.setTagManager('GTM-TKGX8P2');
      loadConsentModalJs();
    }
  </script>
</head>
